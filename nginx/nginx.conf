worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Optimisations pour les gros fichiers
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Autoriser les gros uploads pour l'API (ex: 2Go max)
    client_max_body_size 2000M;

    server {
        listen 80;
        server_name localhost;

        # Page web d'upload (Interface Graphique)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Serveur de fichiers statiques (les packs générés)
        location /packs/ {
            alias /var/www/packs/;
            autoindex off;
            add_header Content-Disposition 'attachment';
            
            # Limiter la bande passante (ex: 5 MegaOctets / sec)
            limit_rate 5m;
            expires 30d;
        }

        # Reverse Proxy vers le Backend FastAPI (Uploads & Endpoints d'API)
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Temps morts très longs pour ne pas couper un upload de 2Go
            proxy_connect_timeout 300s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Bloquer l'accès aux fichiers cachés
        location ~ /\. {
            deny all;
        }
    }
}
